name: Deploy Markdown to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.md
        run: |
          cat << 'EOF' > _config.yml
          theme: jekyll-theme-minimal
          markdown: kramdown
          EOF

          if [ ! -f index.md ]; then
            echo "# Repository Documents" > index.md
            echo "" >> index.md
            
            # Add README if it exists
            if [ -f "README.md" ]; then
                echo "- [Readme](README.html)" >> index.md
            fi
            
            # Add all other markdown files
            for file in *.md; do
              if [[ "$file" != "index.md" && "$file" != "README.md" ]]; then
                # Format filename for the link title: replace underscores with spaces and capitalize
                title=$(echo "$file" | sed 's/\.md$//' | tr '_' ' ' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
                # Jekyll will output .html files
                html_link=$(echo "$file" | sed 's/\.md$/.html/')
                echo "- [$title]($html_link)" >> index.md
              fi
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
