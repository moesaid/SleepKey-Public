name: Deploy Markdown to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate layouts and custom config
        run: |
          mkdir -p _layouts
          cat << 'EOF' > _layouts/default.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{{ page.title | default: site.title }}</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                color: #333;
                max-width: 800px;
                margin: 0 auto;
                padding: 40px 20px;
              }
              a {
                color: #0366d6;
                text-decoration: none;
              }
              a:hover {
                text-decoration: underline;
              }
              .back-button {
                display: inline-block;
                margin-bottom: 30px;
                padding: 8px 16px;
                background-color: #f6f8fa;
                border: 1px solid #e1e4e8;
                border-radius: 6px;
                color: #24292e;
                font-weight: 500;
              }
              .back-button:hover {
                background-color: #e1e4e8;
                text-decoration: none;
              }
              img {
                max-width: 100%;
              }
              pre, code {
                background-color: #f6f8fa;
                border-radius: 3px;
              }
              pre {
                padding: 16px;
                overflow: auto;
              }
            </style>
          </head>
          <body>
            {% if page.url != '/' and page.url != '/index.html' %}
            <a href="{{ site.baseurl }}/" class="back-button">← Back to Documents</a>
            {% endif %}
            <main>
              {{ content }}
            </main>
          </body>
          </html>
          EOF

          cat << 'EOF' > _config.yml
          markdown: kramdown
          EOF

          if [ ! -f index.md ]; then
            echo "# Repository Documents" > index.md
            echo "" >> index.md
            
            # Add README if it exists
            if [ -f "README.md" ]; then
                echo "- [Readme](README.html)" >> index.md
            fi
            
            # Add all other markdown files
            for file in *.md; do
              if [[ "$file" != "index.md" && "$file" != "README.md" ]]; then
                # Format filename for the link title: replace underscores with spaces and capitalize
                title=$(echo "$file" | sed 's/\.md$//' | tr '_' ' ' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
                # Jekyll will output .html files
                html_link=$(echo "$file" | sed 's/\.md$/.html/')
                echo "- [$title]($html_link)" >> index.md
              fi
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
